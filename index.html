<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Store</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f8;}
header{background:#111;color:#fff;padding:15px;text-align:center;position:sticky;top:0;z-index:10;}

.container{padding:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}
.card{background:#fff;border-radius:15px;padding:15px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.card img{width:100%;height:180px;object-fit:cover;border-radius:10px;}
.price{font-weight:bold;margin:10px 0;}

.btn{border:none;padding:10px;width:100%;border-radius:8px;cursor:pointer;margin-top:5px;}
.whatsapp{background:#25D366;color:white;}
.upi{background:#ff9800;color:white;}

/* POPUP */
.popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;justify-content:center;align-items:center;z-index:200;
}
.popup-box{
background:#fff;padding:20px;border-radius:12px;width:90%;max-width:350px;
}
.popup-box input,.popup-box textarea{
width:100%;padding:10px;margin-top:8px;border-radius:5px;border:1px solid #ccc;
}
.close-btn{float:right;cursor:pointer;color:red;}
</style>
</head>

<body>

<header>
<h1>Dream Store</h1>
<p>Order via WhatsApp or Pay Online</p>
</header>

<div class="container">

<!-- Resin Pendant -->
<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Resin Pendant</h3>
<p class="price">₹199</p>
<button class="btn whatsapp" onclick="openForm('Resin Pendant',199,'whatsapp')">WhatsApp</button>
<button class="btn upi" onclick="openForm('Resin Pendant',199,'upi')">Pay</button>
</div>

<!-- Earrings -->
<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Handmade Earrings</h3>
<p class="price">₹149</p>
<button class="btn whatsapp" onclick="openForm('Handmade Earrings',149,'whatsapp')">WhatsApp</button>
<button class="btn upi" onclick="openForm('Handmade Earrings',149,'upi')">Pay</button>
</div>

<!-- Bala -->
<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Bala</h3>
<p class="price">₹249</p>
<button class="btn whatsapp" onclick="openForm('Bala',249,'whatsapp')">WhatsApp</button>
<button class="btn upi" onclick="openForm('Bala',249,'upi')">Pay</button>
</div>

<!-- Mala -->
<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Mala</h3>
<p class="price">₹80</p>
<button class="btn whatsapp" onclick="openForm('Mala',80,'whatsapp')">WhatsApp</button>
<button class="btn upi" onclick="openForm('Mala',80,'upi')">Pay</button>
</div>

</div>

<!-- POPUP FORM -->
<div class="popup" id="popupForm">
<div class="popup-box">

<span class="close-btn" onclick="closeForm()">✖</span>

<h3>Dream Store Order</h3>
<p id="productName"></p>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Your Address"></textarea>

<button class="btn whatsapp" onclick="submitOrder()">Submit</button>

<p id="result"></p>

</div>
</div>

<script>
let selectedProduct="";
let selectedPrice=0;
let orderType="";

function openForm(product,price,type){
selectedProduct=product;
selectedPrice=price;
orderType=type;

document.getElementById("productName").innerText="Product: "+product+" (₹"+price+")";
document.getElementById("popupForm").style.display="flex";
}

function closeForm(){
document.getElementById("popupForm").style.display="none";
}

function submitOrder(){
var name=document.getElementById('name').value;
var phone=document.getElementById('phone').value;
var address=document.getElementById('address').value;

if(name==""||phone==""||address==""){
document.getElementById('result').innerText="Fill all details";
return;
}

if(orderType==="whatsapp"){
var msg="Order:%0AProduct: "+selectedProduct+
"%0AName: "+name+
"%0APhone: "+phone+
"%0AAddress: "+address;

window.location.href="https://wa.me/9775467300?text="+msg;
}

if(orderType==="upi"){
window.location.href="upi://pay?pa=mithunsikder999@axl&pn=Dream Store&am="+selectedPrice+"&cu=INR";
}
}
</script>

</body>
</html>
