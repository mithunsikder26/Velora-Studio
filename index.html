<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Code Handmade Store</title>
<style>
body{margin:0;font-family:Arial;background:#f4f6f8;}
header{background:#111;color:#fff;padding:15px;text-align:center;position:sticky;top:0;z-index:10;}
header span{font-size:14px;display:block;margin-top:5px;}.search-box{padding:10px;text-align:center;} .search-box input{width:90%;max-width:400px;padding:10px;border-radius:8px;border:1px solid #ccc;}

.filters{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:10px;} .filters select, .filters input{padding:8px;border-radius:8px;border:1px solid #ccc;}

.container{padding:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;} .card{background:#fff;border-radius:15px;padding:15px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.1);} .card img{width:100%;height:180px;object-fit:cover;border-radius:10px;} .price{font-weight:bold;margin:10px 0;} .btn{border:none;padding:10px;width:100%;border-radius:8px;cursor:pointer;margin-top:5px;font-size:14px;} .whatsapp{background:#25D366;color:white;} .upi{background:#ff9800;color:white;} .cartbtn{background:#2196f3;color:white;}

/* CART MODAL */ .cartModal{ position:fixed;top:0;right:-100%;width:100%;max-width:400px;height:100%;background:#fff; box-shadow:-5px 0 15px rgba(0,0,0,0.2);transition:0.3s;z-index:100; padding:15px;overflow:auto; } .cartModal.open{right:0;} .cartHeader{display:flex;justify-content:space-between;align-items:center;} .cartItem{border-bottom:1px solid #ddd;padding:10px 0;} .removeBtn{background:red;color:white;border:none;padding:5px;border-radius:5px;cursor:pointer;} .total{font-weight:bold;margin-top:10px;}

.form-box{background:#fff;margin:20px;padding:15px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);} .form-box input, .form-box textarea{width:100%;padding:10px;margin-top:8px;border-radius:5px;border:1px solid #ccc;} </style>

</head>
<body><header>
<h1>For Code Handmade Store</h1>
<p>Order via WhatsApp or Pay Online</p>
<span>Cart: <span id="cartCount">0</span> items</span>
<button onclick="openCart()" style="margin-top:8px;padding:8px;border:none;border-radius:6px;cursor:pointer;">View Cart</button>
</header><div class="search-box">
<input type="text" id="search" placeholder="Search products..." onkeyup="filterProducts()">
</div><div class="filters">
<select id="categoryFilter" onchange="filterProducts()">
<option value="all">All</option>
<option value="pendant">Pendant</option>
<option value="earrings">Earrings</option>
</select>
<input type="number" id="minPrice" placeholder="Min Price" onkeyup="filterProducts()">
<input type="number" id="maxPrice" placeholder="Max Price" onkeyup="filterProducts()">
</div><div class="container" id="productContainer"><div class="card" data-category="pendant" data-price="199">
<img src="https://via.placeholder.com/300">
<h3>Resin Pendant</h3>
<p class="price">₹199</p>
<button class="btn cartbtn" onclick="addToCart('Resin Pendant',199)">Add to Cart</button>
<button class="btn whatsapp" onclick="orderWhatsApp('Resin Pendant')">WhatsApp</button>
<button class="btn upi" onclick="payUPI(199)">Pay</button>
</div><div class="card" data-category="earrings" data-price="149">
<img src="https://via.placeholder.com/300">
<h3>Handmade Earrings</h3>
<p class="price">₹149</p>
<button class="btn cartbtn" onclick="addToCart('Handmade Earrings',149)">Add to Cart</button>
<button class="btn whatsapp" onclick="orderWhatsApp('Handmade Earrings')">WhatsApp</button>
<button class="btn upi" onclick="payUPI(149)">Pay</button>
</div></div><!-- CART --><div class="cartModal" id="cartModal">
<div class="cartHeader">
<h3>Your Cart</h3>
<button onclick="closeCart()">Close</button>
</div>
<div id="cartItems"></div>
<p class="total" id="totalPrice">Total: ₹0</p>
<button class="btn whatsapp" onclick="checkoutCart()">Checkout on WhatsApp</button>
</div><div class="form-box">
<h3>Order Form</h3>
<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Your Address"></textarea>
<button class="btn whatsapp" onclick="submitOrder()">Submit Order</button>
<p id="result"></p>
</div><script>
let cart = [];

function addToCart(name, price){
  let found = cart.find(i => i.name === name);
  if(found){
    found.qty += 1;
  } else {
    cart.push({name,price,qty:1});
  }
  updateCart();
  alert(name + " added to cart");
}

function updateCart(){
  document.getElementById('cartCount').innerText = cart.length;

  let container = document.getElementById('cartItems');
  container.innerHTML = "";
  let total = 0;

  cart.forEach((item,index)=>{
    total += item.price * item.qty;
    container.innerHTML += `
      <div class='cartItem'>
        <b>${item.name}</b><br>
        Qty: ${item.qty} | ₹${item.price}
        <br>
        <button class='removeBtn' onclick='removeItem(${index})'>Remove</button>
      </div>
    `;
  });

  document.getElementById('totalPrice').innerText = "Total: ₹" + total;
}

function removeItem(index){
  cart.splice(index,1);
  updateCart();
}

function openCart(){
  document.getElementById('cartModal').classList.add('open');
}

function closeCart(){
  document.getElementById('cartModal').classList.remove('open');
}

function checkoutCart(){
  let phone = "9775467300";
  let msg = "Order:%0A";
  let total = 0;

  cart.forEach(item=>{
    msg += item.name + " x" + item.qty + " = ₹" + (item.price*item.qty) + "%0A";
    total += item.price*item.qty;
  });

  msg += "%0ATotal: ₹" + total;

  window.location.href = "https://wa.me/" + phone + "?text=" + msg;
}

function orderWhatsApp(product){
  var phone = "9775467300";
  var msg = "Hello, I want to order " + product;
  window.location.href = "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg);
}

function payUPI(amount){
  window.location.href = "upi://pay?pa=mithunsikder999@axl=ForCodeStore&am=" + amount + "&cu=INR";
}

function filterProducts(){
  let search = document.getElementById('search').value.toLowerCase();
  let category = document.getElementById('categoryFilter').value;
  let min = document.getElementById('minPrice').value;
  let max = document.getElementById('maxPrice').value;

  let cards = document.getElementsByClassName('card');

  for(let c of cards){
    let title = c.getElementsByTagName('h3')[0].innerText.toLowerCase();
    let price = parseInt(c.getAttribute('data-price'));
    let cat = c.getAttribute('data-category');

    let ok = title.includes(search) &&
             (category==='all'||cat===category) &&
             (min===''||price>=min) &&
             (max===''||price<=max);

    c.style.display = ok ? "block" : "none";
  }
}

function submitOrder(){
  var name=document.getElementById('name').value;
  var phone=document.getElementById('phone').value;
  var address=document.getElementById('address').value;

  if(name==""||phone==""||address==""){
    document.getElementById('result').innerText="Please fill all details";
    return;
  }

  var msg = "Order:%0A"+name+"%0A"+phone+"%0A"+address;
  window.location.href="https://wa.me/919932446368?text="+msg;
}
</script></body>
</html>
