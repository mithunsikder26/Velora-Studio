<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Store</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f8;}
header{background:#111;color:#fff;padding:15px;text-align:center;}

.notice{
background:#ffeb3b;
color:#000;
text-align:center;
padding:10px;
font-weight:bold;
}

.search-box{text-align:center;padding:10px;}
.search-box input{width:90%;max-width:400px;padding:10px;border-radius:8px;border:1px solid #ccc;}

.container{padding:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}
.card{background:#fff;border-radius:15px;padding:15px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.card img{width:100%;height:180px;object-fit:cover;border-radius:10px;cursor:pointer;}
.price{font-weight:bold;margin:10px 0;}

.btn{border:none;padding:10px;width:100%;border-radius:8px;margin-top:5px;cursor:pointer;}
.whatsapp{background:#25D366;color:white;}
.upi{background:#ff9800;color:white;}
.cartbtn{background:#2196f3;color:white;}

.cartModal{position:fixed;top:0;right:-100%;width:100%;max-width:400px;height:100%;background:#fff;transition:0.3s;padding:15px;}
.cartModal.open{right:0;}

.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;justify-content:center;align-items:center;}
.popup-box{background:#fff;padding:20px;border-radius:10px;width:90%;max-width:350px;}
.popup-box input,.popup-box textarea{width:100%;padding:10px;margin-top:8px;border:1px solid #ccc;border-radius:5px;}

/* IMAGE MODAL */
#imgModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;z-index:999;}
#imgModal img{
max-width:90%;
max-height:90%;
border-radius:10px;
transition: transform 0.3s ease;
cursor: zoom-in;
}
#imgModal span{position:absolute;top:20px;right:30px;font-size:30px;color:white;cursor:pointer;}
</style>
</head>

<body>

<header>
<h1>Dream Store</h1>
<p>Cart: <span id="cartCount">0</span></p>
<button onclick="openCart()">View Cart</button>
</header>

<div class="notice" id="noticeBoard"></div>

<div class="search-box">
<input type="text" id="search" placeholder="Search..." onkeyup="filterProducts()">
</div>

<div class="container" id="productContainer"></div>

<div class="cartModal" id="cartModal">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<p id="totalPrice"></p>
<button onclick="checkoutCart()">Checkout</button>
<button onclick="closeCart()">Close</button>
</div>

<div class="popup" id="popupForm">
<div class="popup-box">
<span onclick="closeForm()" style="float:right;cursor:pointer;">❌</span>
<h3>Order Form</h3>
<p id="productName"></p>
<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Address"></textarea>
<button class="btn whatsapp" onclick="submitOrder()">Submit</button>
</div>
</div>

<div id="imgModal">
<span onclick="closeImage()">❌</span>
<img id="modalImg">
</div>





<script>
// 🔥🔥🔥 শুধু এইখানে control করবে 🔥🔥🔥
let noticeText = "🔥 🛒Free delivery charge above 199 taka🚛";
let noticeEnabled = true;




// 🔥🔥🔥 শুধু এইখানেই product add করবে 🔥🔥🔥
let products = [
  {name:"Pendant", price:199, image:"https://via.placeholder.com/300"},
  {name:"Earrings", price:149, image:"https://via.placeholder.com/300"},
  {name:"Bala", price:249, image:"https://via.placeholder.com/300"},
  {name:"Globe", price:80, image:"https://i.postimg.cc/zfcrvd4s/globe.jpg/300"},
  {name:"churi", price:40, image:"https://via.placeholder.com/300"}
];

// NOTICE
function loadNotice(){
if(noticeEnabled){
document.getElementById("noticeBoard").style.display="block";
document.getElementById("noticeBoard").innerText = noticeText;
}else{
document.getElementById("noticeBoard").style.display="none";
}
}

// PRODUCTS
function loadProducts(){
let container=document.getElementById("productContainer");
container.innerHTML="";

products.forEach(p=>{
container.innerHTML+=`
<div class="card">
<img src="${p.image}" onclick="openImage('${p.image}')">
<h3>${p.name}</h3>
<p class="price">₹${p.price}</p>

<button class="btn cartbtn" onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
<button class="btn whatsapp" onclick="openForm('${p.name}',${p.price},'whatsapp')">WhatsApp</button>
<button class="btn upi" onclick="openForm('${p.name}',${p.price},'upi')">Pay</button>
</div>
`;
});
}

// IMAGE
let zoomLevel = 1;

function openImage(src){
document.getElementById("imgModal").style.display="flex";
let img = document.getElementById("modalImg");
img.src=src;
img.style.transform="scale(1)";
zoomLevel=1;
history.pushState({imgOpen:true}, "");
}

function closeImage(){
document.getElementById("imgModal").style.display="none";
let img=document.getElementById("modalImg");
img.style.transform="scale(1)";
zoomLevel=1;
}

document.getElementById("modalImg").addEventListener("click", function(){
if(zoomLevel===1){
zoomLevel=2;
this.style.transform="scale(2)";
}else{
zoomLevel=1;
this.style.transform="scale(1)";
}
});

// IMAGE BACK
window.addEventListener("popstate", function(){
let modal = document.getElementById("imgModal");
if(modal.style.display === "flex"){
closeImage();
}
});

// CART
let cart=[];

function addToCart(n,p){
let f=cart.find(i=>i.name===n);
if(f){f.qty++;}else{cart.push({name:n,price:p,qty:1});}
updateCart();
}

function updateCart(){
document.getElementById("cartCount").innerText=cart.length;

let html="",total=0;
cart.forEach((i,idx)=>{
total+=i.price*i.qty;
html+=i.name+" x"+i.qty+" = ₹"+(i.price*i.qty)+"<br><button onclick='removeItem("+idx+")'>Remove</button><hr>";
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("totalPrice").innerText="Total ₹"+total;
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

function openCart(){
document.getElementById("cartModal").classList.add("open");
updateCart();
history.pushState({cartOpen:true}, "");
}

function closeCart(){
document.getElementById("cartModal").classList.remove("open");
}

// CART BACK
window.addEventListener("popstate", function(){
let cart = document.getElementById("cartModal");
if(cart.classList.contains("open")){
closeCart();
}
});

// ORDER (unchanged)
let mode="",selectedProduct="",selectedPrice=0;

function openForm(p,price,type){
mode=type;
selectedProduct=p;
selectedPrice=price;

document.getElementById("productName").innerText=p+" ₹"+price;
document.getElementById("popupForm").style.display="flex";
}

function closeForm(){
document.getElementById("popupForm").style.display="none";
}

function checkoutCart(){
mode="cart";
document.getElementById("productName").innerText="Cart Checkout";
document.getElementById("popupForm").style.display="flex";
}

function submitOrder(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

if(!name||!phone||!address){
alert("Fill all details");
return;
}

if(mode==="cart"){
let msg="Dream Store Order%0A";
let total=0;

cart.forEach(i=>{
msg+=i.name+" x"+i.qty+" = ₹"+(i.price*i.qty)+"%0A";
total+=i.price*i.qty;
});

msg+="Total ₹"+total+"%0A";
msg+="Name:"+name+" Phone:"+phone+" Address:"+address;

window.location.href="https://wa.me/919775467300?text="+msg;
return;
}

if(mode==="whatsapp"){
let msg="Product:"+selectedProduct+
"%0APrice:₹"+selectedPrice+
"%0AName:"+name+
"%0APhone:"+phone+
"%0AAddress:"+address;

window.location.href="https://wa.me/919775467300?text="+msg;
}

if(mode==="upi"){
let note=encodeURIComponent(selectedProduct+" "+name);

window.location.href="upi://pay?pa=mithunsikder999@axl&pn=Dream Store&am="+selectedPrice+"&cu=INR&tn="+note;
}

}

// SEARCH
function filterProducts(){
let s=document.getElementById("search").value.toLowerCase();
let cards=document.getElementsByClassName("card");

for(let c of cards){
let t=c.getElementsByTagName("h3")[0].innerText.toLowerCase();
c.style.display=t.includes(s)?"block":"none";
}
}

// LOAD
loadNotice();
loadProducts();

</script>

</body>
</html>
