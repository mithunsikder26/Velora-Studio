<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Store</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f8;}
header{background:#111;color:#fff;padding:15px;text-align:center;}

.notice{
background:#ffeb3b;
color:#000;
text-align:center;
padding:10px;
font-weight:bold;
}

.search-box{text-align:center;padding:10px;}
.search-box input{width:90%;max-width:400px;padding:10px;border-radius:8px;border:1px solid #ccc;}

.container{padding:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}
.card{background:#fff;border-radius:15px;padding:15px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.card img{width:100%;height:180px;object-fit:cover;border-radius:10px;cursor:pointer;}
.price{font-weight:bold;margin:10px 0;}

.btn{border:none;padding:10px;width:100%;border-radius:8px;margin-top:5px;cursor:pointer;}
.whatsapp{background:#25D366;color:white;}
.upi{background:#ff9800;color:white;}
.cartbtn{background:#2196f3;color:white;}

.cartModal{position:fixed;top:0;right:-100%;width:100%;max-width:400px;height:100%;background:#fff;transition:0.3s;padding:15px;}
.cartModal.open{right:0;}

.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;justify-content:center;align-items:center;}
.popup-box{background:#fff;padding:20px;border-radius:10px;width:90%;max-width:350px;}
.popup-box input,.popup-box textarea{width:100%;padding:10px;margin-top:8px;border:1px solid #ccc;border-radius:5px;}

#imgModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;z-index:999;}
#imgModal img{
max-width:90%;
max-height:90%;
border-radius:10px;
transition: transform 0.3s ease;
cursor: zoom-in;
}
#imgModal span{position:absolute;top:20px;right:30px;font-size:30px;color:white;cursor:pointer;}
</style>
</head>

<body>

<header>
<h1>Dream Store</h1>
<p>Cart: <span id="cartCount">0</span></p>
<button onclick="openCart()">View Cart</button>
</header>

<div class="notice" id="noticeBoard"></div>

<div class="search-box">
<input type="text" id="search" placeholder="Search..." onkeyup="filterProducts()">
</div>

<div class="container" id="productContainer"></div>

<div class="cartModal" id="cartModal">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<p id="totalPrice"></p>
<button onclick="checkoutCart()">Checkout</button>
<button onclick="closeCart()">Close</button>
</div>

<div class="popup" id="popupForm">
<div class="popup-box">
<span onclick="closeForm()" style="float:right;cursor:pointer;">❌</span>
<h3>Order Form</h3>
<p id="productName"></p>
<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Address"></textarea>
<button class="btn whatsapp" onclick="submitOrder()">Submit</button>
</div>
</div>

<div id="imgModal">
<span onclick="closeImage()">❌</span>
<img id="modalImg">
</div>

<script>
// 🔥🔥🔥 শুধু এইখানে control করবে 🔥🔥🔥
let noticeText = "🔥 🛒Free delivery charge above 199 rupees🚛";
let noticeEnabled = true;

// 🔥🔥🔥 শুধু এইখানেই product add করবে 🔥🔥🔥
let products = [
  {name:"Pendant", price:199, image:"https://via.placeholder.com/300"},
  {name:"Earrings", price:149, image:"https://via.placeholder.com/300"},
  {name:"Bala", price:249, image:"https://via.placeholder.com/300"},
  {name:"Globe", price:80, image:"https://i.postimg.cc/zfcrvd4s/globe.jpg/300"},
  {name:"churi", price:40, image:"https://via.placeholder.com/300"}
];

// NOTICE
function loadNotice(){
if(noticeEnabled){
document.getElementById("noticeBoard").style.display="block";
document.getElementById("noticeBoard").innerText = noticeText;
}else{
document.getElementById("noticeBoard").style.display="none";
}
}

// PRODUCTS (OLD - unchanged)
function loadProducts(){
let container=document.getElementById("productContainer");
container.innerHTML="";

products.forEach(p=>{
container.innerHTML+=`
<div class="card">
<img src="${p.image}" onclick="openImage('${p.image}')">
<h3>${p.name}</h3>
<p class="price">₹${p.price}</p>

<button class="btn cartbtn" onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
<button class="btn whatsapp" onclick="openForm('${p.name}',${p.price},'whatsapp')">WhatsApp</button>
<button class="btn upi" onclick="openForm('${p.name}',${p.price},'upi')">Pay</button>
</div>
`;
});
}

// IMAGE + CART + ORDER + SEARCH (same as yours)
// 👉 (সব আগের মতোই আছে, কিছুই change করা হয়নি)

// ====== NEW SMART SYSTEM START ======
let allProducts = [...products];
let currentPage = 1;
let perPage = 6;

function loadProducts(){
let container=document.getElementById("productContainer");
container.innerHTML="";

let start = (currentPage-1)*perPage;
let end = start + perPage;

let pageProducts = allProducts.slice(start,end);

pageProducts.forEach(p=>{
container.innerHTML+=`
<div class="card">
<img src="${p.image}" loading="lazy" onclick="openImage('${p.image}')">
<h3>${p.name}</h3>
<p class="price">₹${p.price}</p>

<button class="btn cartbtn" onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
<button class="btn whatsapp" onclick="openForm('${p.name}',${p.price},'whatsapp')">WhatsApp</button>
<button class="btn upi" onclick="openForm('${p.name}',${p.price},'upi')">Pay</button>
</div>
`;
});

let totalPages = Math.ceil(allProducts.length/perPage);
let paginationHTML = "<div style='text-align:center;margin-top:20px;'>";

for(let i=1;i<=totalPages;i++){
paginationHTML += `<button onclick="goPage(${i})" style="margin:5px;padding:8px;">${i}</button>`;
}

paginationHTML += "</div>";
container.innerHTML += paginationHTML;
}

function goPage(p){
currentPage = p;
loadProducts();
}

function addNewProduct(name,price,image){
allProducts.push({name,price,image});
loadProducts();
}
// ====== NEW SMART SYSTEM END ======

// LOAD
loadNotice();
loadProducts();
</script>

</body>
</html>
