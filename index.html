<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Store</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f8;}
header{background:#111;color:#fff;padding:15px;text-align:center;position:sticky;top:0;z-index:10;}

.search-box{text-align:center;padding:10px;}
.search-box input{width:90%;max-width:400px;padding:10px;border-radius:8px;border:1px solid #ccc;}

.container{padding:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}
.card{background:#fff;border-radius:15px;padding:15px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.card img{width:100%;height:180px;object-fit:cover;border-radius:10px;}
.price{font-weight:bold;margin:10px 0;}

.btn{border:none;padding:10px;width:100%;border-radius:8px;cursor:pointer;margin-top:5px;}
.whatsapp{background:#25D366;color:white;}
.upi{background:#ff9800;color:white;}
.cartbtn{background:#2196f3;color:white;}

/* CART */
.cartModal{
position:fixed;top:0;right:-100%;width:100%;max-width:400px;height:100%;
background:#fff;box-shadow:-5px 0 15px rgba(0,0,0,0.2);
transition:0.3s;z-index:200;padding:15px;overflow:auto;
}
.cartModal.open{right:0;}
.cartItem{border-bottom:1px solid #ddd;padding:10px 0;}

/* POPUP */
.popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;justify-content:center;align-items:center;z-index:300;
}
.popup-box{
background:#fff;padding:20px;border-radius:12px;width:90%;max-width:350px;
}
.popup-box input,.popup-box textarea{
width:100%;padding:10px;margin-top:8px;border-radius:5px;border:1px solid #ccc;
}
</style>
</head>

<body>

<header>
<h1>Dream Store</h1>
<p>Cart: <span id="cartCount">0</span></p>
<button onclick="openCart()">View Cart</button>
</header>

<div class="search-box">
<input type="text" placeholder="Search..." id="search" onkeyup="filterProducts()">
</div>

<div class="container" id="productContainer">

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Resin Pendant</h3>
<p class="price">₹199</p>
<button class="cartbtn btn" onclick="addToCart('Resin Pendant',199)">Add to Cart</button>
<button class="whatsapp btn" onclick="openForm('Resin Pendant',199,'whatsapp')">WhatsApp</button>
<button class="upi btn" onclick="openForm('Resin Pendant',199,'upi')">Pay</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Handmade Earrings</h3>
<p class="price">₹149</p>
<button class="cartbtn btn" onclick="addToCart('Handmade Earrings',149)">Add to Cart</button>
<button class="whatsapp btn" onclick="openForm('Handmade Earrings',149,'whatsapp')">WhatsApp</button>
<button class="upi btn" onclick="openForm('Handmade Earrings',149,'upi')">Pay</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Bala</h3>
<p class="price">₹249</p>
<button class="cartbtn btn" onclick="addToCart('Bala',249)">Add to Cart</button>
<button class="whatsapp btn" onclick="openForm('Bala',249,'whatsapp')">WhatsApp</button>
<button class="upi btn" onclick="openForm('Bala',249,'upi')">Pay</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Mala</h3>
<p class="price">₹80</p>
<button class="cartbtn btn" onclick="addToCart('Mala',80)">Add to Cart</button>
<button class="whatsapp btn" onclick="openForm('Mala',80,'whatsapp')">WhatsApp</button>
<button class="upi btn" onclick="openForm('Mala',80,'upi')">Pay</button>
</div>

</div>

<!-- CART -->
<div class="cartModal" id="cartModal">
<h3>Cart</h3>
<div id="cartItems"></div>
<p id="totalPrice"></p>
<button onclick="closeCart()">Close</button>
</div>

<!-- POPUP -->
<div class="popup" id="popupForm">
<div class="popup-box">
<h3>Order</h3>
<p id="productName"></p>
<input type="text" id="name" placeholder="Name">
<input type="text" id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>
<button class="btn whatsapp" onclick="submitOrder()">Submit</button>
</div>
</div>

<script>
let cart=[];
let selectedProduct="";
let selectedPrice=0;
let orderType="";

function addToCart(name,price){
cart.push({name,price});
document.getElementById("cartCount").innerText=cart.length;
}

function openCart(){
document.getElementById("cartModal").classList.add("open");
let html="",total=0;
cart.forEach(item=>{
html+=item.name+" ₹"+item.price+"<br>";
total+=item.price;
});
document.getElementById("cartItems").innerHTML=html;
document.getElementById("totalPrice").innerText="Total ₹"+total;
}

function closeCart(){
document.getElementById("cartModal").classList.remove("open");
}

function openForm(p,price,type){
selectedProduct=p;
selectedPrice=price;
orderType=type;
document.getElementById("productName").innerText=p+" ₹"+price;
document.getElementById("popupForm").style.display="flex";
}

function submitOrder(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

if(!name||!phone||!address){alert("Fill all");return;}

if(orderType==="whatsapp"){
window.location.href="https://wa.me/9775467300?text=Order:"+selectedProduct+" "+name;
}

if(orderType==="upi"){
window.location.href="upi://pay?pa=mithunsikder999@axl&pn=Dream Store&am="+selectedPrice+"&cu=INR";
}
}

function filterProducts(){
let s=document.getElementById("search").value.toLowerCase();
let cards=document.getElementsByClassName("card");
for(let c of cards){
let t=c.getElementsByTagName("h3")[0].innerText.toLowerCase();
c.style.display=t.includes(s)?"block":"none";
}
}
</script>

</body>
</html>
